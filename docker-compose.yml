services:
  mysql:
    container_name: agent-platform-mysql
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-agent_platform}
    ports:
      - "13308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - agent_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    environment:
      DATABASE_URL: mysql+aiomysql://root:${MYSQL_ROOT_PASSWORD:-password}@mysql:3306/${MYSQL_DATABASE:-agent_platform}
      FERNET_KEY: ${FERNET_KEY}
    ports:
      - "8000:8000"
    networks:
      - agent_network
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    networks:
      - agent_network
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  agent_network:
    driver: bridge
